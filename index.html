<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>瞬間英作文音声練習ドリル</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;

  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;

  padding:20px;
  box-sizing:border-box;
}

#ja{
  font-size:52px;
  font-weight:bold;
  margin-bottom:30px;
  line-height:1.4;
}

#answer{
  margin-top:15px;
  font-size:32px;
  color:blue;
}

input{
  width:90%;
  max-width:700px;

  font-size:30px;

  padding:15px;

  margin-top:20px;

  text-align:center;
}

.button-area{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;

  margin-top:20px;
}

button{

  width:240px;

  height:75px;

  font-size:28px;

  border-radius:15px;

  cursor:pointer;
}

#result{
  margin-top:25px;
  font-size:28px;
  white-space:pre-line;
}

@media (max-width:600px){

  #ja{
    font-size:56px;
  }

  input{
    font-size:32px;
  }

  button{
    width:260px;
    height:80px;
    font-size:30px;
  }

  #result{
    font-size:30px;
  }

}

</style>
</head>

<body>

<h2 id="ja"></h2>

<div id="answer"></div>

<input
id="voiceText"
type="text"
placeholder="ここに認識結果が表示されます">

<div class="button-area">

<button onclick="start()">開始</button>

<button onclick="stop()">終了</button>

<button onclick="nextQuestion()">次の問題</button>

</div>

<div id="result"></div>

<script>

const data = [

  {en:"I play soccer.", ja:"私はサッカーをします"},
  {en:"She is my friend.", ja:"彼女は私の友達です"},
  {en:"I eat breakfast.", ja:"私は朝ごはんを食べます"},
  {en:"I like apples.", ja:"私はりんごが好きです"}

];

let current = 0;
let speech = null;
let latestText = "";

function normalize(text){

  return text
    .toLowerCase()
    .replace(/[.,!?]/g,"")
    .trim();

}

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

if(SpeechRecognition){

  speech = new SpeechRecognition();

  speech.lang = "en-US";

  speech.continuous = true;

  speech.interimResults = false;

  speech.onresult = function(e){

    latestText =
      e.results[e.results.length - 1][0].transcript;

    document.getElementById("voiceText").value =
      latestText;

  };

}else{

  alert("このブラウザは音声認識に対応していません");

}

function showQuestion(){

  document.getElementById("ja").innerText =
    data[current].ja;

  document.getElementById("answer").innerText = "";

  document.getElementById("result").innerText = "";

  document.getElementById("voiceText").value = "";

  latestText = "";

}

showQuestion();

function start(){

  latestText = "";

  try{

    speech.start();

  }catch(error){

    console.log(error);

  }

}

function stop(){

  if(speech){

    speech.stop();

  }

  setTimeout(() => {

    judge();

  },100);

}

function judge(){

  const user =
    normalize(latestText);

  const correct =
    normalize(data[current].en);

  speechSynthesis.cancel();

  if(user === correct){

    document.getElementById("result").innerText =
      "✅ Correct!";

    document.getElementById("answer").innerText =
      data[current].en;

    const uttr =
      new SpeechSynthesisUtterance(
        "Correct. " + data[current].en
      );

    uttr.lang = "en-US";
    uttr.rate = 1.0;

    speechSynthesis.speak(uttr);

  }

  else{

    document.getElementById("result").innerText =
      "❌ 間違っています\n\nあなた： "
      + latestText +
      "\n\n正解： "
      + data[current].en;

    document.getElementById("answer").innerText =
      data[current].en;

    const uttr =
      new SpeechSynthesisUtterance(
        "Incorrect. Try again. "
        + data[current].en
      );

    uttr.lang = "en-US";
    uttr.rate = 1.0;

    speechSynthesis.speak(uttr);

  }

}

function nextQuestion(){

  speechSynthesis.cancel();

  current++;

  if(current >= data.length){

    current = 0;

  }

  showQuestion();

  setTimeout(() => {

    start();

  },300);

}

</script>

</body>
</html>
