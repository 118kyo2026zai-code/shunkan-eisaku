<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>瞬間英作文音声練習ドリル</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

button{
  font-size:20px;
  margin:10px;
  padding:10px 20px;
}

input{
  width:80%;
  font-size:22px;
  padding:10px;
}

#result{
  margin-top:20px;
  font-size:22px;
  white-space:pre-line;
}

</style>
</head>

<body>

<h2 id="ja"></h2>

<h3 id="en"></h3>

<input
id="voiceText"
type="text"
placeholder="ここに認識結果が表示されます">

<br>

<button onclick="start()">🎤開始</button>

<button onclick="stop()">■終了</button>

<button onclick="nextQuestion()">➡次へ</button>

<div id="result"></div>

<script>

const data = [

{en:"I play soccer.",ja:"私はサッカーをします"},

{en:"She is my friend.",ja:"彼女は私の友達です"},

{en:"I eat breakfast.",ja:"私は朝ごはんを食べます"},

{en:"I like apples.",ja:"私はりんごが好きです"}

];

let current = 0;

let speech;

let latestText = "";

function showQuestion(){

  document.getElementById("ja").innerText =
    data[current].ja;

  document.getElementById("en").innerText =
    data[current].en;

  document.getElementById("voiceText").value = "";

  document.getElementById("result").innerText = "";

  setTimeout(() => {

    document.getElementById("voiceText").focus();

  },200);

}

showQuestion();

function start(){

  latestText = "";

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert("このブラウザは音声認識に対応していません");

    return;

  }

  speech = new SpeechRecognition();

  speech.lang = "en-US";

  speech.continuous = true;

  speech.interimResults = false;

  speech.onresult = function(e){

    latestText =
      e.results[e.results.length-1][0].transcript;

    document.getElementById("voiceText").value =
      latestText;

  };

  speech.start();

}

function normalize(text){

  return text
    .toLowerCase()
    .replace(/[.,!?]/g,"")
    .trim();

}

function stop(){

  if(speech){

    speech.stop();

  }

  setTimeout(() => {

    const user =
      normalize(latestText);

    const correct =
      normalize(data[current].en);

    speechSynthesis.cancel();

    if(user === correct){

      document.getElementById("result").innerText =
        "✅ Correct!";

      const ok =
        new SpeechSynthesisUtterance("Correct");

      ok.lang = "en-US";

      speechSynthesis.speak(ok);

    }

    else{

      document.getElementById("result").innerText =
        "❌ Incorrect\n\nあなた： "
        + latestText +
        "\n\n正解： "
        + data[current].en;

      const ng =
        new SpeechSynthesisUtterance(
          "Incorrect. Try again."
        );

      ng.lang = "en-US";

      ng.rate = 1.0;

      ng.onend = function(){

        const answer =
          new SpeechSynthesisUtterance(
            data[current].en
          );

        answer.lang = "en-US";

        answer.rate = 0.9;

        speechSynthesis.speak(answer);

      };

      speechSynthesis.speak(ng);

    }

  },300);

}

function nextQuestion(){

  speechSynthesis.cancel();

  current++;

  if(current >= data.length){

    current = 0;

  }

  showQuestion();

}

</script>

</body>
</html>
