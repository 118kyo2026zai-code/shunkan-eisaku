<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>瞬間英作文音声練習ドリル</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;

  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;

  padding:20px;
  box-sizing:border-box;
}

.top-area{

  position:fixed;

  top:10px;

  left:10px;

  z-index:1000;

}

#micButton{

  width:180px;

  height:70px;

  font-size:24px;

  background:#ffd966;

  border:3px solid #cc9900;

  border-radius:15px;

}
  #unitSelect{

  width:220px;

  font-size:24px;

  padding:8px;

  display:block;

  margin:0 auto 15px auto;

}
#ja{
  font-size:45px;
  font-weight:bold;
  margin-bottom:20px;
  line-height:1.4;
}

#answer{
  margin-top:10px;
  font-size:40px;
  color:blue;
  line-height:1.4;
}

input{
  width:90%;
  max-width:700px;

  font-size:30px;

  padding:15px;

  display:block;
  margin:20px auto;

  text-align:center;
}

.button-area{
  display:flex;
  flex-direction:column;
  align-items:center;

  gap:25px;

  margin-top:20px;
}

button{

  width:280px;

  height:90px;

  font-size:32px;

  border-radius:15px;

  cursor:pointer;
}

#result{
  margin-top:25px;
  font-size:28px;
  white-space:pre-line;
}

@media (max-width:600px){
#unitSelect{

  font-size:34px;

}
  #ja{
    font-size:20px;
  }

  #answer{
    font-size:20px;
  }

  input{
    font-size:15px;
  }

  button{
    width:260px;
    height:80px;
    font-size:33px; 
  }

  #result{
    font-size:20px;
  }

}

</style>
</head>


<body>

<div class="top-area">

<button id="micButton" onclick="start()">
🎤 マイクを許可
</button>

</div>
<select id="unitSelect" onchange="changeUnit()">

<option value="all">全部</option>

<option value="肯定文第三文型</option>

<option value="to不定詞">to不定詞</option>

<option value="従属接続詞">従属接続詞</option>

<option value="疑問詞③">疑問詞③</option>

</select>
<h2 id="ja"></h2>
<div id="result"></div>
<div id="answer"></div>

<input
id="voiceText"
type="text"
placeholder="ここに認識結果が表示されます">

<div class="button-area">

<button onclick="stop()">判定</button>

<button onclick="nextQuestion()">次の問題</button>

<button onclick="repeatAudio()">🔊 もう一回聞く</button>

</div>




<script src="data.js"></script>

<script>




let current = 0;
let currentData = data;  
let speech = null;
let latestText = "";
let wrongQuestions = [];
function normalize(text){

  return text
    .toLowerCase()
    .replace(/[.,!?]/g,"")
    .trim();

}

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

if(SpeechRecognition){

  speech = new SpeechRecognition();

  speech.lang = "en-US";

  speech.continuous = true;

  speech.interimResults = false;

  speech.onresult = function(e){

    latestText =
      e.results[e.results.length - 1][0].transcript;

    document.getElementById("voiceText").value =
      latestText;

  };

}else{

  alert("このブラウザは音声認識に対応していません");

}

function showQuestion(){

  document.getElementById("ja").innerText =
    currentData[current].ja;

  document.getElementById("answer").innerText = "";

  document.getElementById("result").innerText = "";

  document.getElementById("voiceText").value = "";

  latestText = "";

}

showQuestion();
  function speakAnswer(message){

  speechSynthesis.cancel();

  const uttr =
    new SpeechSynthesisUtterance(message);

  uttr.lang = "en-US";

  uttr.rate = 1.0;

  speechSynthesis.speak(uttr);

}

function start(){

  latestText = "";

  try{

    speech.start();

    document.getElementById(
      "micButton"
    ).style.display = "none";

  }catch(error){

    console.log(error);

  }

}

function stop(){

  if(speech){

    speech.stop();

  }

  setTimeout(() => {

    judge();

  },100);

}

function judge(){

  const user =
    normalize(latestText);

  const correct =
  normalize(currentData[current].en);

  speechSynthesis.cancel();

  if(user === correct){

    document.getElementById("result").innerText =
       "⭕ 正解！";

    document.getElementById("answer").innerText =
      currentData[current].en;

    speakAnswer(
  currentData[current].en
);
    }

  else{

  document.getElementById("result").innerText =
    "❌ ちがいます";

  document.getElementById("answer").innerText =
    currentData[current].en;
if(!wrongQuestions.includes(currentData[current])){

  wrongQuestions.push(
    currentData[current]
  );

}
  speakAnswer(
  currentData[current].en

  );

}


}

function nextQuestion(){

  speechSynthesis.cancel();

  current++;

  if(current >= currentData.length){

    if(wrongQuestions.length > 0){

      currentData = [...wrongQuestions];

      wrongQuestions = [];

      current = 0;

      alert(
        "復習スタート！\n間違えた問題をもう一度やります。"
      );

    }

    else{

      alert("🏆 クリア！");

      current = 0;

      showQuestion();

      return;

    }

  }

  showQuestion();

  setTimeout(() => {

    start();

  },300);

}
  function repeatAudio(){

  speakAnswer(
    currentData[current].en
  );

}
  function changeUnit(){

  const selected =
    document.getElementById(
      "unitSelect"
    ).value;

  if(selected === "all"){

    currentData = data;

  }else{

    currentData =
      data.filter(
        q => q.unit === selected
      );

  }

  current = 0;

  showQuestion();

}




</script>

</body>
</html>
